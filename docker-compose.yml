version: "3.8"

services:

  # ── Frontend (React + Nginx) ──────────────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ── Backend (Express API) ──────────────────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      - SOLANA_ENGINE_URL=http://solana-engine:8000
      - DATABASE_URL=postgresql://studyai:studyai123@postgres:5432/studyai
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    depends_on:
      - solana-engine
      - postgres
      - redis
    restart: unless-stopped

  # ── Solana AI Engine (FastAPI + RAG) ──────────────────────────────────────
  solana-engine:
    build: ./solana-engine
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8080
    volumes:
      - ./embeddings:/app/embeddings
      - ./trained-models:/app/trained-models
    depends_on:
      - ollama
      - chromadb
    restart: unless-stopped

  # ── Solana Training Module (run on demand) ────────────────────────────────
  solana-training:
    build: ./solana-training
    environment:
      - BASE_MODEL=${BASE_MODEL:-meta-llama/Llama-3.2-3B-Instruct}
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - ./datasets:/app/datasets
      - ./trained-models:/app/trained-models
      - ./training-scripts:/app/training-scripts
    profiles:
      - training
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ── Ollama (Local LLM Server) ─────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    # Uncomment below for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ── ChromaDB (Vector Database) ────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8080:8080"
    volumes:
      - ./vector-db:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped

  # ── PostgreSQL (Session & History Storage) ────────────────────────────────
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=studyai
      - POSTGRES_PASSWORD=studyai123
      - POSTGRES_DB=studyai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # ── Redis (Cache) ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  ollama_models:
  postgres_data:
  redis_data:
